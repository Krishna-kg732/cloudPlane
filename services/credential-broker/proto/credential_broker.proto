syntax = "proto3";

package credentialbroker.v1;

option go_package = "cloudplane/credential-broker/proto/credentialbroker/v1;credentialbrokerv1";

// CredentialBrokerService issues short-lived cloud credentials
service CredentialBrokerService {
  // IssueAWSCredentials exchanges an OIDC token for temporary AWS credentials
  rpc IssueAWSCredentials(IssueAWSCredentialsRequest) returns (IssueAWSCredentialsResponse);
  
  // Health check
  rpc Health(HealthRequest) returns (HealthResponse);
}

message IssueAWSCredentialsRequest {
  // The IAM role ARN to assume in the user's account
  string role_arn = 1;
  
  // Requested TTL in seconds (max 900)
  int32 ttl = 2;
}

message IssueAWSCredentialsResponse {
  // Temporary credentials
  string access_key_id = 1;
  string secret_access_key = 2;
  string session_token = 3;
  
  // Expiration timestamp (RFC3339)
  string expires_at = 4;
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
  string service = 2;
}
